name: Headless Workflow Contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract-and-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run contract tests
        run: cargo test -p pantograph-workflow-service --test contract

      - name: Check UniFFI adapter parity build
        run: cargo check -p pantograph-uniffi

      - name: Check Rustler adapter parity build
        run: cargo check -p pantograph_rustler
